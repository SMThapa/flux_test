apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: argocd
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 3m
  timeout: 5m
  prune: true
  wait: true
  path: ./software/argocd #ingress-nginx.yaml
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
